services:
  app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    volumes:
      - ./../database:/app
    working_dir: /app
    environment:
      - DB_URL=postgres://postgres:postgres@db:5432/mydb?sslmode=disable
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"