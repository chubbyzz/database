version: '3.9'

services:
  app:
    build:
      context: /home/jeffs/dev/database
      dockerfile: docker/Dockerfile
    volumes:
      - ./database:/app
    working_dir: /app
    environment:
      - DB_URL=postgres://postgres:postgres@db:5432/mydb?sslmode=disable
    depends_on:
      - db
    entrypoint: ["goose", "-dir", "migrations", "postgres", "$$DB_URL", "up"]

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"